name: STAR OS Kernel CI
on: [push, pull_request]
jobs:
  build-aarch64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
        with:
          targets: aarch64-unknown-none
      - run: cargo build --package staros-kernel --lib
  test-host:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
      - run: cargo test --package staros-kernel --lib --features std --target x86_64-unknown-linux-gnu
  clippy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: clippy
          targets: aarch64-unknown-none
      - run: cargo clippy --package staros-kernel --lib -- -W warnings
  doc:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
        with:
          targets: aarch64-unknown-none
      - run: cargo doc --package staros-kernel --no-deps
